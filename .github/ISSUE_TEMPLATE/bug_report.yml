name: Bug report
description: Report a reproducible defect without attaching private manga pages.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please redact private paths and content. `manga-localizer doctor` is useful.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: List the smallest sequence of steps that reproduces the issue.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows, Linux, Other]
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor output
      render: shell
